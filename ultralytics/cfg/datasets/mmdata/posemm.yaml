# 多模态POSE数据集配置模板
# 用于 YOLOMM/YOLO26 多模态姿态估计任务

# 数据集路径（使用时需修改为实际路径）
path: /path/to/mm-pose-dataset
train: images/train
val: images/val

# 关键点配置 (COCO 17关键点)
kpt_shape: [17, 3]
flip_idx: [0, 2, 1, 4, 3, 6, 5, 8, 7, 10, 9, 12, 11, 14, 13, 16, 15]

# 类别
names:
  0: person

# 多模态配置
modality_used: [rgb, depth]
modality:
  rgb: images
  depth: images_depth
Xch: 3

# 关键点名称
kpt_names:
  0:
    - nose
    - left_eye
    - right_eye
    - left_ear
    - right_ear
    - left_shoulder
    - right_shoulder
    - left_elbow
    - right_elbow
    - left_wrist
    - right_wrist
    - left_hip
    - right_hip
    - left_knee
    - right_knee
    - left_ankle
    - right_ankle
