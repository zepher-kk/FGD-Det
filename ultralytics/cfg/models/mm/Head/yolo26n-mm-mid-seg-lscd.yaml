# Ultralytics YOLO26MM Mid-Fusion with LSCD Segmentation Head
# YOLO26MM RGB+X 标准中期融合 + LSCD轻量化分割头
# 核心策略: 双路独立YOLO26骨干网 + P4/P5双层融合 + LSCD轻量化分割头
# 适用场景: 需要轻量化部署的多模态实例分割任务，在保持精度的同时大幅减少参数量和计算量

# Parameters
nc: 80  # number of classes
end2end: True  # YOLO26特性: end-to-end detection
reg_max: 1  # YOLO26特性: simplified DFL bins

scales:  # model compound scaling constants
  # [depth, width, max_channels]
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

# P4/P5双层融合架构（同 yolo26n-mm-mid.yaml）
backbone:
  # ========== RGB路径 (层0-10) - 完整YOLO26骨干到P5 ==========
  - [-1, 1, Conv, [64, 3, 2], 'RGB']       # 0-P1/2 RGB路径起始
  - [-1, 1, Conv, [128, 3, 2]]             # 1-P2/4
  - [-1, 2, C3k2, [256, False, 0.25]]      # 2
  - [-1, 1, Conv, [256, 3, 2]]             # 3-P3/8 (RGB_P3)
  - [-1, 2, C3k2, [512, False, 0.25]]      # 4
  - [-1, 1, Conv, [512, 3, 2]]             # 5-P4/16
  - [-1, 2, C3k2, [512, True]]             # 6 (RGB_P4)
  - [-1, 1, Conv, [1024, 3, 2]]            # 7-P5/32
  - [-1, 2, C3k2, [1024, True]]            # 8
  - [-1, 1, SPPF, [1024, 5, 3, True]]      # 9 (YOLO26: shortcut=True)
  - [-1, 2, C2PSA, [1024]]                 # 10 (RGB_P5)

  # ========== X路径 (层11-21) - 完整YOLO26骨干到P5 ==========
  - [-1, 1, Conv, [64, 3, 2], 'X']         # 11-P1/2 X路径起始
  - [-1, 1, Conv, [128, 3, 2]]             # 12-P2/4
  - [-1, 2, C3k2, [256, False, 0.25]]      # 13
  - [-1, 1, Conv, [256, 3, 2]]             # 14-P3/8 (X_P3)
  - [-1, 2, C3k2, [512, False, 0.25]]      # 15
  - [-1, 1, Conv, [512, 3, 2]]             # 16-P4/16
  - [-1, 2, C3k2, [512, True]]             # 17 (X_P4)
  - [-1, 1, Conv, [1024, 3, 2]]            # 18-P5/32
  - [-1, 2, C3k2, [1024, True]]            # 19
  - [-1, 1, SPPF, [1024, 5, 3, True]]      # 20 (YOLO26: shortcut=True)
  - [-1, 2, C2PSA, [1024]]                 # 21 (X_P5)

  # ========== P4和P5层级融合 ==========
  - [[6, 17], 1, Concat, [1]]              # 22 P4融合: RGB_P4(6) + X_P4(17)
  - [-1, 2, C3k2, [1024, True]]            # 23 (Fused_P4)

  - [[10, 21], 1, Concat, [1]]             # 24 P5融合: RGB_P5(10) + X_P5(21)
  - [-1, 2, C3k2, [1024, True]]            # 25
  - [-1, 1, C2PSA, [1024]]                 # 26 (Fused_P5)

# YOLO26 检测颈部 + LSCD分割头
head:
  - [26, 1, nn.Upsample, [None, 2, "nearest"]]  # 27 Fused_P5上采样
  - [[-1, 23], 1, Concat, [1]]                  # 28 连接Fused_P4
  - [-1, 2, C3k2, [512, True]]                  # 29

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]  # 30
  - [[-1, 4], 1, Concat, [1]]                   # 31 连接RGB_P3(4)
  - [-1, 2, C3k2, [256, True]]                  # 32 (P3/8-small)

  - [-1, 1, Conv, [256, 3, 2]]                  # 33
  - [[-1, 29], 1, Concat, [1]]                  # 34
  - [-1, 2, C3k2, [512, True]]                  # 35 (P4/16-medium)

  - [-1, 1, Conv, [512, 3, 2]]                  # 36
  - [[-1, 26], 1, Concat, [1]]                  # 37
  - [-1, 1, C3k2, [1024, True, 0.5]]            # 38 (P5/32-large)

  # LSCD分割头 - 轻量化共享卷积分割
  - [[32, 35, 38], 1, Segment_LSCD, [nc, 32, 256, 256]]  # 39 LSCD分割头(P3, P4, P5)
