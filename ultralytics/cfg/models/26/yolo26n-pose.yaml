# YOLO26n pose estimation model with Pose26 head
# YOLO26 特性: end2end检测 + 简化DFL + RealNVP流模型 + 关键点不确定性估计

# Parameters
nc: 1  # number of classes (person)
kpt_shape: [17, 3]  # keypoints shape [num_keypoints, dims]
end2end: True  # end-to-end detection
reg_max: 1  # simplified DFL bins

scales:  # model compound scaling constants
  # [depth, width, max_channels]
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

# YOLO26n backbone
backbone:
  - [-1, 1, Conv, [64, 3, 2]]  # 0-P1/2
  - [-1, 1, Conv, [128, 3, 2]]  # 1-P2/4
  - [-1, 2, C3k2, [256, False, 0.25]]  # 2
  - [-1, 1, Conv, [256, 3, 2]]  # 3-P3/8
  - [-1, 2, C3k2, [512, False, 0.25]]  # 4
  - [-1, 1, Conv, [512, 3, 2]]  # 5-P4/16
  - [-1, 2, C3k2, [512, True]]  # 6
  - [-1, 1, Conv, [1024, 3, 2]]  # 7-P5/32
  - [-1, 2, C3k2, [1024, True]]  # 8
  - [-1, 1, SPPF, [1024, 5, 3, True]]  # 9
  - [-1, 2, C2PSA, [1024]]  # 10

# YOLO26n head
head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]  # 11
  - [[-1, 6], 1, Concat, [1]]  # 12
  - [-1, 2, C3k2, [512, True]]  # 13

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]  # 14
  - [[-1, 4], 1, Concat, [1]]  # 15
  - [-1, 2, C3k2, [256, True]]  # 16 (P3/8-small)

  - [-1, 1, Conv, [256, 3, 2]]  # 17
  - [[-1, 13], 1, Concat, [1]]  # 18
  - [-1, 2, C3k2, [512, True]]  # 19 (P4/16-medium)

  - [-1, 1, Conv, [512, 3, 2]]  # 20
  - [[-1, 10], 1, Concat, [1]]  # 21
  - [-1, 1, C3k2, [1024, True, 0.5]]  # 22 (P5/32-large)

  - [[16, 19, 22], 1, Pose26, [nc, kpt_shape]]  # 23 Pose26(P3, P4, P5)
